<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->

    <meta name="keywords" content="Principal Engineer, AI Systems, RAG, Azure OpenAI, Cloud Native, Aviation Software, Microservices Architecture">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Yatin B. - Principal Software Engineer">
    <meta property="og:description" content="Building production AI systems from architecture to 1000+ users. Engineer specializing in RAG, agentic workflows, and cloud-native platforms.">
    <meta property="og:type" content="website">

    <title>Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-brand" id="nav-brand"></div>
            <div class="nav-links">
                <a href="#projects">Projects</a>
                <a href="#writing">Writing</a>
                <a href="#skills">Skills</a>
                <a href="#contact">Contact</a>
            </div>
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu">
        <a href="#projects">Projects</a>
        <a href="#writing">Writing</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <h1 class="hero-name" id="hero-name"></h1>
        <p class="hero-title" id="hero-title"></p>
        <p class="hero-tagline" id="hero-tagline"></p>

        <div class="hero-stats" id="hero-stats"></div>

        <div class="hero-cta">
            <a href="#projects" class="cta-link">→ View Projects</a>
        </div>
    </section>

    <!-- Featured Projects -->
    <section id="projects" class="section">
        <h2 class="section-heading">Featured Projects</h2>
        <div id="featured-projects"></div>

        <h3 class="subsection-heading">Other Notable Work</h3>
        <div class="brief-projects" id="other-projects"></div>
    </section>

    <!-- Featured Writing -->
    <section id="writing" class="section">
        <h2 class="section-heading">Featured Writing</h2>
        <div id="writing-list"></div>
    </section>

    <!-- Technical Skills -->
    <section id="skills" class="section">
        <h2 class="section-heading">Technical Skills</h2>
        <div id="skills-container"></div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section">
        <h2 class="section-heading">Contact</h2>
        <div class="contact-links" id="contact-links"></div>
        <div id="resume-link-container" style="display: none; margin-top: 16px;">
            <a id="resume-link" href="" class="contact-link" target="_blank" rel="noopener">→ Download Resume</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p id="footer-text"></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
